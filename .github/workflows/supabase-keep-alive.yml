name: Supabase Keep Alive

on:
  schedule:
    # 주 3회 실행 (월, 수, 금 오전 9시 UTC = 오후 6시 KST)
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health Check
        run: |
          # REST API에 요청을 보내 프로젝트 활성 상태를 유지한다.
          # HTTP 상태 코드로 성공 여부를 판별한다.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.GRINDSUPABASE_URL }}/rest/v1/health_check?select=id&limit=1" \
            -H "apikey: ${{ secrets.GRINDSUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.GRINDSUPABASE_ANON_KEY }}")

          echo "HTTP status: $HTTP_CODE"

          # 2xx(정상) 또는 인증/권한 관련 4xx 응답이 오면 서버가 살아있는 것으로 간주한다.
          # (health_check 테이블이 없어도 404/401 등 응답 자체가 오면 프로젝트는 활성 상태)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
            echo "Supabase ping successful!"
          else
            echo "Supabase ping failed (status $HTTP_CODE)"
            exit 1
          fi
