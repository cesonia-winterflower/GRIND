name: Build & Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# gh-pages 브랜치에 빌드 결과를 푸시(브랜치 기반 배포)
permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        # 시크릿이 있으면 사용, 없으면 소스의 공개 anon 기본값으로 폴백
        env:
          VITE_SUPABASE_URL: ${{ secrets.GRINDSUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.GRINDSUPABASE_ANON_KEY }}
        run: npm run build

      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
